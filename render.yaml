services:
  - type: web
    name: pa-fabs-erp-backend
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false            # set to the Vercel URL after the frontend deploys
      - key: DATABASE_URL
        fromDatabase:
          name: pa-fabs-db
          property: connectionString

databases:
  - name: pa-fabs-db
    plan: free
    region: oregon
